# One Netlify site for the whole AR Tools suite. The build assembles two SPAs:
#   /         → frontend/        (the suite app, React 19 / Vite 8)
#   /fanout/  → fanout-frontend/ (vendored Topic Fanout app, React 18 / Vite 5)
# See netlify-build.sh. `base` is intentionally unset so the command runs at the
# repo root and can build both apps.
[build]
  command = "bash netlify-build.sh"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallbacks — order matters (first match wins). The /fanout/* rule must come
# before the catch-all so deep links into the Fanout app resolve to its own
# index.html rather than the suite's.
[[redirects]]
  from = "/fanout/*"
  to = "/fanout/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
