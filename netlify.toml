# One Netlify site for the whole AR Tools suite — a single SPA (React 19 / Vite
# 8). The Topic Fan-out app is merged in as a native route subtree under /fanout
# (Option C), so there's no longer a separate build or a /fanout/* fallback: the
# suite's own index.html serves every route, Fan-out included.
[build]
  command = "bash netlify-build.sh"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every deep link resolves to the single app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache-busting for deploys. Vite fingerprints JS/CSS into /assets/<name>.<hash>.<ext>,
# so those are content-addressed and safe to cache forever. Everything else —
# most importantly the HTML app shell (served for every route via the SPA
# fallback above) plus sw.js / the manifest — must always revalidate, or a
# browser will keep serving the previous build's shell (which points at stale
# asset hashes) after a deploy. Netlify applies the most specific path rule per
# header, so /assets/* overrides the catch-all for hashed files.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
