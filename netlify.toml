# One Netlify site for the whole AR Tools suite — a single SPA (React 19 / Vite
# 8). The Topic Fan-out app is merged in as a native route subtree under /fanout
# (Option C), so there's no longer a separate build or a /fanout/* fallback: the
# suite's own index.html serves every route, Fan-out included.
[build]
  command = "bash netlify-build.sh"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every deep link resolves to the single app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
